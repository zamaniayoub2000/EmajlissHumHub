<style>
@import url('https://fonts.googleapis.com/css2?family=Raleway:wght@600;700;800&family=Open+Sans:wght@400;600&display=swap');

.emajlis-nav-widget {
  width: 100%;
  box-sizing: border-box;
  margin: 0 0 18px 0;
  font-family: 'Open Sans', sans-serif;
}

/* ── titre section ── */
.emajlis-nav-widget .nav-header {
  text-align: center;
  margin-bottom: 14px;
}
.emajlis-nav-widget .nav-header span {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #999;
  display: block;
  margin-bottom: 3px;
}
.emajlis-nav-widget .nav-header h3 {
  margin: 0;
  font-family: 'Raleway', sans-serif;
  font-size: 17px;
  font-weight: 800;
  color: #2c2c2c;
  letter-spacing: 0.5px;
}

/* ── grid des boutons ── */
.emajlis-nav-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

/* ── chaque carte bouton ── */
.emajlis-nav-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-decoration: none;
  background: #ffffff;
  border: 1.5px solid #e8e4df;
  border-radius: 14px;
  padding: 18px 14px 14px;
  width: 120px;
  min-height: 110px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.emajlis-nav-card::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  opacity: 0;
  transition: opacity 0.2s;
}
.emajlis-nav-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.13);
  border-color: transparent;
}
.emajlis-nav-card:hover::before { opacity: 1; }

/* ── icône cercle coloré ── */
.emajlis-nav-card .nav-circle {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.emajlis-nav-card .nav-circle svg {
  width: 28px;
  height: 28px;
  fill: #fff;
}

/* ── label ── */
.emajlis-nav-card .nav-label {
  font-family: 'Raleway', sans-serif;
  font-size: 10.5px;
  font-weight: 700;
  text-align: center;
  letter-spacing: 0.3px;
  line-height: 1.3;
  color: #2c2c2c;
  text-transform: uppercase;
}

/* ── couleurs par carte ── */
/* CPCPFD — rouge bordeaux dégradé */
.card-cpcpfd .nav-circle { background: radial-gradient(circle at 35% 35%, #c0392b, #7a1616); }
.card-cpcpfd::before { background: linear-gradient(90deg, #c0392b, #7a1616); }
.card-cpcpfd:hover .nav-label { color: #8b1a1a; }

/* BUREAU DU CONSEIL — teal */
.card-br .nav-circle { background: radial-gradient(circle at 35% 35%, #1abc9c, #0e8a71); }
.card-br::before { background: linear-gradient(90deg, #1abc9c, #0e8a71); }
.card-br:hover .nav-label { color: #0e8a71; }

/* ASSEMBLÉE GÉNÉRALE — violet-rose */
.card-ag .nav-circle { background: radial-gradient(circle at 35% 35%, #9b59b6, #6c3483); }
.card-ag::before { background: linear-gradient(90deg, #9b59b6, #6c3483); }
.card-ag:hover .nav-label { color: #6c3483; }

/* RESSOURCES DOC — or/kaki */
.card-cn .nav-circle { background: radial-gradient(circle at 35% 35%, #d4ac0d, #9a7d0a); }
.card-cn::before { background: linear-gradient(90deg, #d4ac0d, #9a7d0a); }
.card-cn:hover .nav-label { color: #9a7d0a; }

/* E-SERVICE — bleu */
.card-es .nav-circle { background: radial-gradient(circle at 35% 35%, #2980b9, #1a5276); }
.card-es::before { background: linear-gradient(90deg, #2980b9, #1a5276); }
.card-es:hover .nav-label { color: #1a5276; }

/* VEILLE DOCUMENTAIRE — orange */
.card-vd .nav-circle { background: radial-gradient(circle at 35% 35%, #e67e22, #a04000); }
.card-vd::before { background: linear-gradient(90deg, #e67e22, #a04000); }
.card-vd:hover .nav-label { color: #a04000; }

/* DATA-EFRS — vert foncé */
.card-de .nav-circle { background: radial-gradient(circle at 35% 35%, #27ae60, #1a7a40); }
.card-de::before { background: linear-gradient(90deg, #27ae60, #1a7a40); }
.card-de:hover .nav-label { color: #1a7a40; }
</style>
