<style>
  @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@600;700;800&family=Open+Sans:wght@400;600&display=swap');

  .emf {
    background: linear-gradient(135deg, #6D1A36 0%, #8B2248 50%, #6D1A36 100%);
    border-top: 4px solid #f0a0a0;
    font-family: 'Open Sans', sans-serif;
    padding: 40px 0 0;
    margin-top: 30px;
    color: #fff;
  }

  .emf-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 32px;
  }



  .emf-section-title {
    text-align: center;
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #fff;
    margin: 0 0 20px;
    opacity: 0.9;
  }



  .emf-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
  }

  .emf-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-decoration: none;
    background: #ffffff;
    border: 1.5px solid #e8e4df;
    border-radius: 14px;
    padding: 18px 14px 14px;
    min-height: 115px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .emf-card::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .emf-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.13);
    border-color: transparent;
  }

  .emf-card:hover::before {
    opacity: 1;
  }

  .emf-circle {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .emf-circle svg {
    width: 26px;
    height: 26px;
    fill: #fff;
  }

  .emf-label {
    font-family: 'Raleway', sans-serif;
    font-size: 10px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.3px;
    line-height: 1.3;
    color: #2c2c2c;
    text-transform: uppercase;
  }

  .c1 .emf-circle {
    background: radial-gradient(circle at 35% 35%, #c0392b, #7a1616);
  }

  .c1::before {
    background: linear-gradient(90deg, #c0392b, #7a1616);
  }

  .c1:hover .emf-label {
    color: #8B2248;
  }

  .c2 .emf-circle {
    background: radial-gradient(circle at 35% 35%, #1abc9c, #0e8a71);
  }

  .c2::before {
    background: linear-gradient(90deg, #1abc9c, #0e8a71);
  }

  .c2:hover .emf-label {
    color: #0e8a71;
  }

  .c3 .emf-circle {
    background: radial-gradient(circle at 35% 35%, #9b59b6, #6c3483);
  }

  .c3::before {
    background: linear-gradient(90deg, #9b59b6, #6c3483);
  }

  .c3:hover .emf-label {
    color: #6c3483;
  }

  .c4 .emf-circle {
    background: radial-gradient(circle at 35% 35%, #d4ac0d, #9a7d0a);
  }

  .c4::before {
    background: linear-gradient(90deg, #d4ac0d, #9a7d0a);
  }

  .c4:hover .emf-label {
    color: #9a7d0a;
  }

  .c5 .emf-circle {
    background: radial-gradient(circle at 35% 35%, #e67e22, #a04000);
  }

  .c5::before {
    background: linear-gradient(90deg, #e67e22, #a04000);
  }

  .c5:hover .emf-label {
    color: #a04000;
  }

  .c6 .emf-circle {
    background: radial-gradient(circle at 35% 35%, #27ae60, #1a7a40);
  }

  .c6::before {
    background: linear-gradient(90deg, #27ae60, #1a7a40);
  }

  .c6:hover .emf-label {
    color: #1a7a40;
  }

  .c7 .emf-circle {
    background: radial-gradient(circle at 35% 35%, #2980b9, #1a5276);
  }

  .c7::before {
    background: linear-gradient(90deg, #2980b9, #1a5276);
  }

  .c7:hover .emf-label {
    color: #1a5276;
  }

  .emf-bottom {
    background: rgba(0, 0, 0, 0.15);
    padding: 16px 0;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
  }

  .emf-bottom-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .emf-copy {
    font-size: 12px;
    color: #e8c4c4;
  }

  .emf-copy strong {
    color: #fff;
  }

  .emf-links {
    display: flex;
    gap: 16px;
  }

  .emf-links a {
    font-size: 12px;
    color: #e8c4c4;
    text-decoration: none;
  }

  .emf-links a:hover {
    color: #fff;
  }

  @media(max-width:768px) {
    .emf-grid {
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 10px;
    }

    .emf-card {
      min-height: 100px;
      padding: 14px 10px;
    }

    .emf-label {
      font-size: 9px;
    }
  }

  @media(max-width:640px) {
    .emf-inner {
      padding: 0 20px;
    }



    .emf-bottom-inner {
      flex-direction: column;
      justify-content: center;
      text-align: center;
      gap: 15px;
    }

    .emf-links {
      justify-content: center;
    }
  }

  @media(max-width:400px) {
    .emf-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>
